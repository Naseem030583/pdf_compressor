databases:
  - name: pdfcompressor-db
    plan: free
    databaseName: pdfcompressor
    user: pdfuser

services:
  - type: web
    name: pdf-compressor
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn pdf_compressor.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@example.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "YourStrongPassword123"
      - key: DATABASE_URL
        fromDatabase:
          name: pdfcompressor-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
